<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デザインお題ジェネレーター</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0EEF8;
      --surface: #FFFFFF;
      --ink: #1A1730;
      --ink-muted: #6B6880;
      --accent: #5B4CF5;
      --accent-light: #EAE7FD;
      --accent-dark: #3D30D4;
      --beginner: #16A34A;
      --beginner-bg: #DCFCE7;
      --intermediate: #D97706;
      --intermediate-bg: #FEF3C7;
      --advanced: #DC2626;
      --advanced-bg: #FEE2E2;
      --border: #E4E1F5;
      --radius: 16px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(91,76,245,0.10), 0 1px 4px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 40px rgba(91,76,245,0.15), 0 2px 8px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 0 16px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 56px 0 40px;
    }
    .header-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    header h1 {
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    header p {
      color: var(--ink-muted);
      font-size: 14px;
      line-height: 1.7;
    }

    /* ── Main card ── */
    .main-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: 620px;
      margin: 0 auto;
      padding: 32px;
    }

    /* ── Difficulty ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 10px;
    }
    .difficulty-group {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }
    .diff-btn {
      flex: 1;
      padding: 10px 0;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.18s;
    }
    .diff-btn:hover { border-color: var(--accent); color: var(--accent); }
    .diff-btn.active[data-level="初級"] { background: var(--beginner-bg); border-color: var(--beginner); color: var(--beginner); }
    .diff-btn.active[data-level="中級"] { background: var(--intermediate-bg); border-color: var(--intermediate); color: var(--intermediate); }
    .diff-btn.active[data-level="上級"] { background: var(--advanced-bg); border-color: var(--advanced); color: var(--advanced); }

    /* ── Generate button ── */
    .generate-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .generate-btn:hover { background: var(--accent-dark); }
    .generate-btn:active { transform: scale(0.98); }

    /* ── Result card ── */
    .result-wrapper {
      margin-top: 28px;
      display: none;
    }
    .result-wrapper.visible { display: block; }
    .result-card {
      background: var(--accent-light);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      position: relative;
    }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 99px;
    }
    .badge-初級 { background: var(--beginner-bg); color: var(--beginner); }
    .badge-中級 { background: var(--intermediate-bg); color: var(--intermediate); }
    .badge-上級 { background: var(--advanced-bg); color: var(--advanced); }

    .copy-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { background: var(--beginner-bg); border-color: var(--beginner); color: var(--beginner); }

    .result-items { display: flex; flex-direction: column; gap: 14px; }
    .result-item {}
    .result-item-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 3px;
    }
    .result-item-value {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.6;
      color: var(--ink);
    }
    .constraint-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin: 0;
      padding: 0;
    }
    .constraint-list li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 14px;
      line-height: 1.6;
    }
    .constraint-list li::before {
      content: '▸';
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Edit link ── */
    .edit-row {
      text-align: center;
      margin-top: 20px;
    }
    .edit-link {
      background: none;
      border: none;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: var(--ink-muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.15s;
    }
    .edit-link:hover { color: var(--accent); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,23,48,0.5);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
    }
    @media (min-width: 600px) {
      .modal-overlay { align-items: center; }
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%;
      max-width: 560px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.22s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(24px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-head {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-head h2 { font-size: 16px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      color: var(--ink-muted);
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--ink); }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: 0;
      padding: 16px 24px 0;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      padding: 8px 12px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: var(--accent); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

    /* Difficulty sub-tabs inside modal */
    .modal-diff-group {
      display: flex;
      gap: 6px;
      padding: 14px 24px 0;
      flex-shrink: 0;
    }
    .modal-diff-btn {
      flex: 1;
      padding: 6px 0;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .modal-diff-btn.active[data-level="初級"] { background: var(--beginner-bg); border-color: var(--beginner); color: var(--beginner); }
    .modal-diff-btn.active[data-level="中級"] { background: var(--intermediate-bg); border-color: var(--intermediate); color: var(--intermediate); }
    .modal-diff-btn.active[data-level="上級"] { background: var(--advanced-bg); border-color: var(--advanced); color: var(--advanced); }

    /* Item list */
    .modal-body {
      overflow-y: auto;
      padding: 16px 24px 24px;
      flex: 1;
    }
    .item-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      font-size: 13px;
      line-height: 1.5;
    }
    .item-row.default { color: var(--ink-muted); }
    .item-row.custom { background: var(--accent-light); color: var(--ink); }
    .item-row-text { flex: 1; }
    .item-delete {
      background: none;
      border: none;
      color: var(--advanced);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .item-delete:hover { background: var(--advanced-bg); }

    /* Add row */
    .add-row {
      display: flex;
      gap: 8px;
    }
    .add-input {
      flex: 1;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-btn {
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .add-btn:hover { background: var(--accent-dark); }

    .empty-note {
      font-size: 12px;
      color: var(--ink-muted);
      text-align: center;
      padding: 12px 0 4px;
    }

    @media (max-width: 480px) {
      .main-card { padding: 20px 16px; }
      .difficulty-group { gap: 6px; }
      .diff-btn { font-size: 13px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-eyebrow">Design Practice Tool</div>
  <h1>🎨 デザインお題ジェネレーター</h1>
  <p>Webデザイン練習用のお題をランダム生成します</p>
</header>

<div class="main-card">
  <div class="section-label">難易度</div>
  <div class="difficulty-group">
    <button class="diff-btn active" data-level="初級">初級</button>
    <button class="diff-btn" data-level="中級">中級</button>
    <button class="diff-btn" data-level="上級">上級</button>
  </div>

  <button class="generate-btn" id="generateBtn">
    🎲 お題を生成する
  </button>

  <div class="result-wrapper" id="resultWrapper">
    <div class="result-card">
      <div class="result-header">
        <span class="badge" id="resultBadge"></span>
        <button class="copy-btn" id="copyBtn">📋 コピー</button>
      </div>
      <div class="result-items" id="resultItems"></div>
    </div>
  </div>

  <div class="edit-row">
    <button class="edit-link" id="openEditBtn">⚙️ リストを編集する</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-label="リスト編集">
    <div class="modal-head">
      <h2>リストを編集</h2>
      <button class="modal-close" id="closeModalBtn" aria-label="閉じる">✕</button>
    </div>
    <div class="tab-bar" id="tabBar"></div>
    <div class="modal-diff-group" id="modalDiffGroup">
      <button class="modal-diff-btn active" data-level="初級">初級</button>
      <button class="modal-diff-btn" data-level="中級">中級</button>
      <button class="modal-diff-btn" data-level="上級">上級</button>
    </div>
    <div class="modal-body">
      <div class="item-list" id="itemList"></div>
      <div class="add-row">
        <input class="add-input" id="addInput" type="text" placeholder="新しい項目を入力…" maxlength="80">
        <button class="add-btn" id="addBtn">追加</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Default lists ──────────────────────────────────────────────
const DEFAULTS = {
  業種: {
    初級: ['カフェ','美容院','書店','花屋','ベーカリー','雑貨屋','ネイルサロン','ペットショップ','学習塾','クリーニング店'],
    中級: ['フィットネスジム','歯科クリニック','不動産会社','旅行代理店','アパレルブランド','オーガニックコスメ','写真スタジオ','語学スクール','整体院','ウェディング会社'],
    上級: ['B2B SaaSスタートアップ','工業用機械メーカー','クラフトビール醸造所','オルタナティブ投資ファンド','医療ベンチャー','障害者支援NPO','農業テック企業','バーチャルYouTuber事務所','高級時計修理専門店','サステナブルファッションブランド'],
  },
  ターゲット: {
    初級: ['10代の学生','20代女性','20代男性','30代女性','30代男性','40代主婦','50代男性ビジネスマン','シニア（60代以上）'],
    中級: ['都市部に住む20代のキャリア志向の女性','子育て中の30代共働き夫婦','健康意識が高い30〜40代の男性','地方移住を検討中の30代会社員','副業を始めたい20〜30代のサラリーマン','美容への投資を惜しまない40代女性'],
    上級: ['「自分らしさ」を重視するZ世代（18〜25歳）でSNS発信が好きな女性','忙しすぎて自分時間を取れないことに罪悪感を感じている30代の管理職男性','老後の資産形成に不安を感じ始めた共働きの40代夫婦','環境問題に強い関心があり消費行動に一貫性を求める20代の大学院生'],
  },
  画像の種類: {
    初級: ['Instagram投稿（正方形・1080×1080px）','Xポスト用バナー','チラシA4縦','店頭ポップ','LINEバナー'],
    中級: ['Instagram広告（フィード・1080×1080px）','Instagramストーリーズ広告（1080×1920px）','Webサイトのヒーローバナー（横長）','メールマガジンヘッダー','YouTubeサムネイル'],
    上級: ['交通広告（電車内中吊り）','雑誌見開き広告','Webサイトのファーストビュー全体','Google ディスプレイ広告（複数サイズ）','屋外広告（看板）'],
  },
  内容: {
    初級: ['初回限定クーポンの配布','季節のおすすめ商品紹介','新メニューの告知','期間限定セールのお知らせ','スタッフ紹介'],
    中級: ['新商品ローンチの告知','会員登録キャンペーン','イベント・ワークショップ告知','ブランドリニューアルの発表','お客様の声・testimonial'],
    上級: ['採用ブランディング広告','サービスの世界観を伝えるブランドムービー告知','社会課題への取り組みを伝えるCSR広告','競合との差別化を訴求するサービス比較','投資家向けの企業ブランディング'],
  },
  ゴール: {
    初級: ['来店・予約獲得','クーポンのダウンロード','SNSフォロー獲得','電話での問い合わせ'],
    中級: ['Webサイトへの誘導（クリック率向上）','メルマガ登録','無料体験・試供品の申し込み','資料請求'],
    上級: ['リード獲得（問い合わせフォーム送信）','採用エントリー','投資家へのアピール（信頼性の醸成）','ブランド認知の向上（KPI：インプレッション）'],
  },
  制約: {
    初級: ['ブランドカラー（赤・白）のみ使用','テキストは30文字以内','写真は使わずイラストのみ','キャッチコピーを必ず入れる','ロゴを目立つ位置に配置'],
    中級: ['フォントは1種類のみ','余白を多めに取りミニマルなデザインにする','メインビジュアルは商品写真を使用','英語と日本語を混在させる','QRコードを必ず含める','ダークトーンで高級感を出す'],
    上級: ['コーポレートカラー（ネイビー・ゴールド）を厳守','テキスト情報量が多く整理された読みやすいレイアウト','写真・イラスト・グラフを組み合わせる','アクセシビリティ対応（コントラスト比4.5:1以上）','既存キャンペーンとのビジュアル統一感を保つ','英語圏でも通じるグローバルなデザイン','縦書きと横書きを組み合わせた和のテイスト'],
  },
};

const CONSTRAINT_COUNT = { 初級: [1,2], 中級: [2,3], 上級: [4,5] };
const CATEGORIES = Object.keys(DEFAULTS);
const LS_KEY = 'design_prompt_custom_items';

// ── State ─────────────────────────────────────────────────────
let currentLevel = '初級';
let modalLevel = '初級';
let modalCategory = CATEGORIES[0];
let customItems = loadCustom();

function loadCustom() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return emptyCustom();
    return JSON.parse(raw);
  } catch { return emptyCustom(); }
}
function emptyCustom() {
  const obj = {};
  CATEGORIES.forEach(cat => {
    obj[cat] = { 初級: [], 中級: [], 上級: [] };
  });
  return obj;
}
function saveCustom() {
  localStorage.setItem(LS_KEY, JSON.stringify(customItems));
}

// ── Random helpers ─────────────────────────────────────────────
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, Math.min(n, shuffled.length));
}
function mergedList(category, level) {
  return [...DEFAULTS[category][level], ...(customItems[category]?.[level] ?? [])];
}

// ── Generate ───────────────────────────────────────────────────
document.getElementById('generateBtn').addEventListener('click', () => {
  const level = currentLevel;
  const [min, max] = CONSTRAINT_COUNT[level];
  const count = min + Math.floor(Math.random() * (max - min + 1));

  const result = {
    業種: pick(mergedList('業種', level)),
    ターゲット: pick(mergedList('ターゲット', level)),
    '画像の種類': pick(mergedList('画像の種類', level)),
    内容: pick(mergedList('内容', level)),
    ゴール: pick(mergedList('ゴール', level)),
    制約: pickN(mergedList('制約', level), count),
  };

  renderResult(result, level);
});

function renderResult(result, level) {
  const wrapper = document.getElementById('resultWrapper');
  const badge = document.getElementById('resultBadge');
  const items = document.getElementById('resultItems');
  const icons = { 業種:'🏢', ターゲット:'👤', '画像の種類':'🖼️', 内容:'📝', ゴール:'🎯', 制約:'⚙️' };

  badge.textContent = level;
  badge.className = `badge badge-${level}`;

  let html = '';
  for (const [key, val] of Object.entries(result)) {
    html += `<div class="result-item">
      <div class="result-item-label">${icons[key] || ''} ${key}</div>`;
    if (key === '制約') {
      html += `<ul class="constraint-list">${val.map(v => `<li><span>${v}</span></li>`).join('')}</ul>`;
    } else {
      html += `<div class="result-item-value">${val}</div>`;
    }
    html += `</div>`;
  }
  items.innerHTML = html;
  wrapper.classList.add('visible');

  // store for copy
  wrapper.dataset.copyText = buildCopyText(result, level);
}

function buildCopyText(result, level) {
  const lines = [`【デザインお題】難易度：${level}\n`];
  for (const [key, val] of Object.entries(result)) {
    if (key === '制約') {
      lines.push(`■ 制約`);
      val.forEach(v => lines.push(`  ・${v}`));
    } else {
      lines.push(`■ ${key}：${val}`);
    }
  }
  return lines.join('\n');
}

// ── Copy ──────────────────────────────────────────────────────
document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('resultWrapper').dataset.copyText || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ コピーしました';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 コピー';
      btn.classList.remove('copied');
    }, 2000);
  });
});

// ── Difficulty buttons (main) ─────────────────────────────────
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLevel = btn.dataset.level;
  });
});

// ── Modal open/close ───────────────────────────────────────────
document.getElementById('openEditBtn').addEventListener('click', openModal);
document.getElementById('closeModalBtn').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

function openModal() {
  modalCategory = CATEGORIES[0];
  modalLevel = currentLevel;
  buildTabBar();
  syncModalDiffButtons();
  renderItemList();
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('addInput').focus();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('addInput').value = '';
}

// ── Tab bar ───────────────────────────────────────────────────
function buildTabBar() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = CATEGORIES.map(cat =>
    `<button class="tab-btn${cat === modalCategory ? ' active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');
  bar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      modalCategory = btn.dataset.cat;
      bar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderItemList();
    });
  });
}

// ── Modal difficulty ───────────────────────────────────────────
document.getElementById('modalDiffGroup').querySelectorAll('.modal-diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    modalLevel = btn.dataset.level;
    syncModalDiffButtons();
    renderItemList();
  });
});
function syncModalDiffButtons() {
  document.getElementById('modalDiffGroup').querySelectorAll('.modal-diff-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.level === modalLevel);
  });
}

// ── Item list render ───────────────────────────────────────────
function renderItemList() {
  const list = document.getElementById('itemList');
  const defaults = DEFAULTS[modalCategory][modalLevel];
  const custom = customItems[modalCategory]?.[modalLevel] ?? [];

  let html = '';
  if (defaults.length === 0 && custom.length === 0) {
    html = '<p class="empty-note">まだ項目がありません。下の入力欄から追加してください。</p>';
  }
  defaults.forEach(item => {
    html += `<div class="item-row default"><span class="item-row-text">${item}</span></div>`;
  });
  custom.forEach((item, idx) => {
    html += `<div class="item-row custom">
      <span class="item-row-text">${item}</span>
      <button class="item-delete" data-idx="${idx}" aria-label="削除">✕</button>
    </div>`;
  });
  list.innerHTML = html;

  list.querySelectorAll('.item-delete').forEach(btn => {
    btn.addEventListener('click', () => deleteCustomItem(Number(btn.dataset.idx)));
  });
}

function deleteCustomItem(idx) {
  customItems[modalCategory][modalLevel].splice(idx, 1);
  saveCustom();
  renderItemList();
}

// ── Add item ───────────────────────────────────────────────────
document.getElementById('addBtn').addEventListener('click', addItem);
document.getElementById('addInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

function addItem() {
  const input = document.getElementById('addInput');
  const val = input.value.trim();
  if (!val) return;
  if (!customItems[modalCategory]) customItems[modalCategory] = { 初級: [], 中級: [], 上級: [] };
  if (!customItems[modalCategory][modalLevel]) customItems[modalCategory][modalLevel] = [];
  customItems[modalCategory][modalLevel].push(val);
  saveCustom();
  input.value = '';
  renderItemList();
}
</script>
</body>
</html>
